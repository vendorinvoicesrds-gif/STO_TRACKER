# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: stolifecycle
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4H
          url: http://202.153.35.211:50000/
          client: '100'
        app:
          name: ZSTO_TRACKER
          description: A fiori application for STO Tracking
          package: ZSTO_COCKPIT
          transport: S4HK905012
        exclude:
          - /test/
          - /localService/
